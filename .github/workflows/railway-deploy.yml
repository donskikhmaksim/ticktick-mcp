# Instant auto-deploy on every push to main — fans out to ALL deployment
# targets so everyone who onboarded (each target is a shared multi-tenant
# server) gets the update at once, within ~a minute of the push.
#
# Why a GitHub Action instead of Railway's own GitHub auto-deploy:
# some targets live on a DIFFERENT Railway account than this GitHub repo, and
# the cross-account Railway↔GitHub webhook doesn't fire. This Action is the
# repo's OWN CI (always reliable) and uses `railway up` from the freshly
# checked-out commit — the only method that ships current code (`railway
# redeploy` rebuilds the stale uploaded image).
#
# ADD A DEPLOYMENT TARGET (e.g. another person who self-hosts this server):
#   1. In THAT Railway account create a token (Account → Tokens).
#   2. Add it to this repo's GitHub secrets under a unique name, e.g.
#      RAILWAY_TOKEN_ALICE  (gh secret set RAILWAY_TOKEN_ALICE ...).
#   3. Add one entry to the `include:` matrix below: name/project/service/token.
# The next push deploys to every listed target in parallel.

name: Deploy to Railway (instant, all targets)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: railway-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # one target failing must not block the others
      matrix:
        include:
          # ── Anessa's account ──
          - name: anessa
            project: f9721307-6f8b-442c-839b-c479b765ee79
            service: ticktick-mcp
            token_secret: RAILWAY_TOKEN
          # ── add more onboarded hosts here (see header) ──
          # - name: alice
          #   project: <alice-project-id>
          #   service: ticktick-mcp
          #   token_secret: RAILWAY_TOKEN_ALICE
    name: deploy → ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: railway up (fresh code) → ${{ matrix.name }}
        env:
          RAILWAY_TOKEN: ${{ secrets[matrix.token_secret] }}
        run: >-
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::no token for target ${{ matrix.name }} — skipped (add secret ${{ matrix.token_secret }})";
            exit 0;
          fi;
          railway up --ci
          --project ${{ matrix.project }}
          --environment production
          --service ${{ matrix.service }}
